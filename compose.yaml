services:
  fastapi_database:
    image: postgres:16
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  fastapi_app:
    image: fastapi_async
    entrypoint: ./entrypoint.sh
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - fastapi_database
    environment:
      DATABASE_URL: postgresql+psycopg://app_user:app_password@fastapi_database:5432/app_db

volumes:
  pgdata: